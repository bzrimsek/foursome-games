function woPressPrompt(matchIdx, startHole, cost) {
  const pressCost=cost*2;
  openModal(`<h2>Match ${matchIdx+1} starts H${startHole}</h2>
    <div style="font-size:14px;color:var(--muted);margin-bottom:16px;">$${cost} · H${startHole}–end</div>
    <div style="font-size:13px;margin-bottom:16px;">Press to double the bet to <strong>$${pressCost}</strong>?</div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="woPressFromPrompt(${matchIdx},${startHole},${cost})">PRESS ($${pressCost})</button>
      <button class="btn btn-outline" onclick="closeModal()">NO PRESS ($${cost})</button>
    </div>`);
}
function woPressFromPrompt(matchIdx, startHole, cost) {
  // Replace the just-added match with a doubled-cost version
  const g=S.activeGame;
  if(g.matches[matchIdx]) g.matches[matchIdx].cost=cost*2;
  closeModal(); scheduleWrite(); renderWalkoffGame();
}

function renderWalkoffScorecard(g,players,course) {
  if (!course) return '';
  return renderScorecard(g, players, null);
}

// Manual close — opens modal to confirm winner
function woCloseMatchManual(idx) {
  const g=S.activeGame,m=g.matches[idx],st=calcOneMatch(g,m);
  const w=st.diff>0?'A':st.diff<0?'B':'tie';
  const mNum=idx+1;
  openModal(`<h2>Close Match ${mNum}</h2>
    <div class="field"><label>Winner</label>
      <select id="cl-winner"><option value="A"${w==='A'?' selected':''}>Team A</option><option value="B"${w==='B'?' selected':''}>Team B</option><option value="tie"${w==='tie'?' selected':''}>Halved</option></select>
    </div>
    <div class="field"><label>Closed on Hole</label>
      <input type="number" id="cl-hole" value="${st.closedOnHole||st.thru}" min="1" max="18">
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="woConfirmClose(${idx})">CONFIRM</button>
      <button class="btn btn-outline" onclick="closeModal()">CANCEL</button>
    </div>`);
}
function woConfirmClose(idx) {
  const m=S.activeGame.matches[idx];
  m.closed=true;
  m.winner=document.getElementById('cl-winner').value;
  m.closedOnHole=parseInt(document.getElementById('cl-hole').value);
  closeModal();
  // Auto-start next match
  const g=S.activeGame,course=courseById(g.courseId);
  const nextStart=m.closedOnHole+1;
  if(nextStart<=course.holes.length && idx===g.matches.length-1) {
    const nextCost=idx===0?g.cost2:g.matches[idx].cost;
    g.matches.push({startHole:nextStart,cost:nextCost,closed:false,winner:null,closedOnHole:null});
    scheduleWrite();
    // Ask about press
    woPressPrompt(g.matches.length-1, nextStart, nextCost);
  } else {
    scheduleWrite(); renderWalkoffGame();
  }
}
// Manual start match 2 (if auto-start was skipped)
function woStartNextMatch() {
  const g=S.activeGame,course=courseById(g.courseId);
  const lastClosed=g.matches[g.matches.length-1];
  const nextStart=(lastClosed.closedOnHole||1)+1;
  if(nextStart>course.holes.length) return toast('No holes remaining');
  const nextCost=g.matches.length===1?g.cost2:lastClosed.cost;
  g.matches.push({startHole:nextStart,cost:nextCost,closed:false,winner:null,closedOnHole:null});
  scheduleWrite(); renderWalkoffGame(); toast(`Match ${g.matches.length} starts H${nextStart}`);
}
// Press: double the current match by starting a new sub-match from next hole at same cost × 2
function woAddPress(idx) {
  const g=S.activeGame,course=courseById(g.courseId);
  const st=calcOneMatch(g,g.matches[idx]);
  if(!st||st.remaining<=0) return toast('No holes remaining to press');
  // Find next unplayed hole
  const nextHole=(g.matches[idx].startHole||1)+st.thru;
  const pressCost=g.matches[idx].cost*2;
  // Close current match at this hole, start press from same hole
  g.matches[idx].closed=true;
  g.matches[idx].winner=st.diff>0?'A':st.diff<0?'B':'tie';
  g.matches[idx].closedOnHole=nextHole-1;
  g.matches.push({startHole:nextHole,cost:pressCost,closed:false,winner:null,closedOnHole:null,isPress:true});
  scheduleWrite(); renderWalkoffGame(); toast(`Press — M${g.matches.length} $${pressCost} from H${nextHole}`);
}


function renderWalkoffSettlement(g) {
  // Sum all closed matches; open matches use current standing
  let aTotal=0, bTotal=0;
  const lines=[];
  (g.matches||[]).forEach((m,idx)=>{
    const mNum=idx+1;
    const st=calcOneMatch(g,m);
    if(!st) return;
    const winner=m.closed?m.winner:st.winner; // use live standing for open matches
    const cost=m.cost;
    const status=m.closed?`closed`:`live`;
    if(!winner||winner==='tie'){
      lines.push({label:`M${mNum} ($${cost}) — Halved`,amt:0,status});
    } else {
      aTotal += winner==='A'?cost:-cost;
      bTotal += winner==='B'?cost:-cost;
      lines.push({label:`M${mNum} ($${cost}) — Team ${winner} wins`,amt:winner==='A'?cost:-cost,status,winner});
    }
  });
  const tAn=g.teams.A.map(id=>playerById(id)?.name.split(' ')[0]||id).join(' & ');
  const tBn=g.teams.B.map(id=>playerById(id)?.name.split(' ')[0]||id).join(' & ');
  let html='<div style="font-size:11px;margin-bottom:8px;">';
  lines.forEach(l=>{
    const col=l.amt>0?'var(--gold)':l.amt<0?'#dc2626':'var(--muted)';
    html+=`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--surf3);">
      <span style="color:var(--muted);font-size:10px;">${l.label}${l.status==='live'?' ●':''}</span>
    </div>`;
  });
  html+='</div>';
  html+=`<table class="settle-table"><tbody>
    <tr><td>Team A: ${esc(tAn)}</td><td class="${aTotal>0?'settle-pos':aTotal<0?'settle-neg':''}" style="text-align:right;">${aTotal>0?'+':''}$${aTotal}</td></tr>
    <tr><td>Team B: ${esc(tBn)}</td><td class="${bTotal>0?'settle-pos':bTotal<0?'settle-neg':''}" style="text-align:right;">${bTotal>0?'+':''}$${bTotal}</td></tr>
  </tbody></table>`;
  const net=Math.abs(aTotal);
  if(net>0){
    const payer=aTotal<0?tAn:tBn, payee=aTotal>0?tAn:tBn;
    html+=`<div class="settle-txn"><span class="settle-neg">${esc(payer)}</span> pays <span class="settle-pos">${esc(payee)}</span> $${net}</div>`;
  }
  return html;
}

function finalizeWalkoffGame() {
  const g=S.activeGame;
  const summary=g.matches.map((m,i)=>{
    const st=calcOneMatch(g,m);
    const w=m.closed?m.winner:st?.winner;
    return `M${i+1}($${m.cost}):${w||'open'}`;
  }).join(' | ');
  S.games.push({...g,summary,finalDate:Date.now()});
  S.activeGame=null; scheduleWrite(); toast('Saved!'); renderGameTab();
}

// Compatibility shim for updateStandingsInPlace
function calcWalkoffMatch(g, matchNum) {
  // Legacy shim — used by updateStandingsInPlace for in-place banner updates
  const m=g.matches?.[matchNum-1];
  if(!m) return {label:'All Square',score:'All Square',thru:0,cls:'mb-pending',color:'#8a6700',diff:0};
  const st=calcOneMatch(g,m);
  if(!st) return {label:'All Square',score:'All Square',thru:0,cls:'mb-pending',color:'#8a6700',diff:0};
  return {...st, display:st.score};
}


// ════════════════════════════════════════════
// NASSAU (FRONT / BACK / TOTAL)
// Three independent best-ball matches: Front 9, Back 9, and full 18.
// Each match has its own bet amount (costF, costB, costT). Winner of each
// segment is determined by total net strokes (best-ball per hole, then sum).
// calcFBTSeg() scores any set of holes; renderFBTGame() scores all three.
// ════════════════════════════════════════════
function showFBTSetup() {
  window._teamState={A:[],B:[]};
  const courses18=S.courses.filter(c=>c.holes.length===18);
  document.getElementById('game-area').innerHTML=`
    <div class="card">
      <div class="card-title">Nassau Setup</div>
      <div class="field"><label>Course (18 holes required)</label>
        <select id="fbt-course">${courses18.map(c=>`<option value="${c.id}">${esc(c.name)}${c.teeColor?' — '+esc(c.teeColor):''}</option>`).join('')||'<option value="">— no 18-hole courses —</option>'}</select>
      </div>
      <div class="field-row3">
        <div class="field"><label>Front ($)</label><input id="fbt-f" type="number" value="10" min="1"></div>
        <div class="field"><label>Back ($)</label><input id="fbt-b" type="number" value="10" min="1"></div>
        <div class="field"><label>Total ($)</label><input id="fbt-t" type="number" value="10" min="1"></div>
      </div>
      <div class="field"><label>Stroke Mode</label>
        <select id="fbt-stroke"><option value="field">Individual HCPs</option><option value="low"${S.settings.strokeOffBest?' selected':''}>Stroke off low man</option></select>
      </div>
      <div class="section-label">Assign Teams</div>
      <div id="team-assign-container"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-outline btn-sm" onclick="showGameTypePicker()">← Back</button>
        <button class="btn btn-gold" style="flex:1;" onclick="startFBTGame()">▶ START NASSAU</button>
      </div>
    </div>`;
  refreshTeamAssign();
}

function startFBTGame() {
  const ts=window._teamState;
  if ((ts.A||[]).length!==2||(ts.B||[]).length!==2) return toast('Assign 2 players to each team');
  const courseId=document.getElementById('fbt-course').value;
  if (!courseId) return toast('No 18-hole course available');
  const course=courseById(courseId);
  if (course.holes.length<18) return toast('Need an 18-hole course');
  const costF=parseInt(document.getElementById('fbt-f').value);
  const costB=parseInt(document.getElementById('fbt-b').value);
  const costT=parseInt(document.getElementById('fbt-t').value);
  const strokeMode=document.getElementById('fbt-stroke').value;
  const players=window._pickedIds.map(id=>playerById(id));
  const {chs,rawChs}=buildChs(players,course,strokeMode==='low');
  S.activeGame={
    id:uid(),type:'fbt',date:Date.now(),
    courseId:course.id,courseName:course.name,
    costF,costB,costT,strokeMode,
    teams:{A:ts.A,B:ts.B},playerIds:window._pickedIds,
    playerNames:window._pickedIds.map(id=>playerById(id)?.name||id),
    chs,rawChs,scores:{}
  };
  window._pickedIds.forEach(id=>{S.activeGame.scores[id]={};});
  scheduleWrite(); renderFBTGame();
}

// Score a Nassau segment (front 9, back 9, or all 18).
// Each hole: team best-ball net. Whichever team has fewer total strokes wins.
// winner='A'|'B'|'tie'|null (null = segment not yet complete).
function calcFBTSeg(g,holes) {
  const sc=g.scores;
  let aT=0,bT=0,played=0;
  holes.forEach(h=>{
    const aN=g.teams.A.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):null;}).filter(v=>v!==null);
    const bN=g.teams.B.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):null;}).filter(v=>v!==null);
    if(!aN.length||!bN.length)return;
    aT+=Math.min(...aN); bT+=Math.min(...bN); played++;
  });
  if(!played)return{aT:null,bT:null,winner:null,played:0};
  return{aT,bT,winner:aT<bT?'A':aT>bT?'B':'tie',played};
}

function renderFBTGame() {
  const g=S.activeGame;
  const players=g.playerIds.map(id=>playerById(id)||{id,name:id});
  const course=courseById(g.courseId);
  const front=course.holes.slice(0,9),back=course.holes.slice(9),all=course.holes;
  const fR=calcFBTSeg(g,front),bR=calcFBTSeg(g,back),tR=calcFBTSeg(g,all);
  const tA=g.teams.A.map(id=>players.find(p=>p.id===id)?.name.split(' ')[0]).join(' & ');
  const tB=g.teams.B.map(id=>players.find(p=>p.id===id)?.name.split(' ')[0]).join(' & ');
  const el=document.getElementById('game-area');
  const banner=(label,cost,r,bid)=>{
    const w=r.winner;
    const cls=!w?'mb-pending':w==='tie'?'mb-tied':w==='A'?'mb-up':'mb-down';
    const color=!w?'#8a6700':w==='tie'?'#8a6700':w==='A'?'#166534':var_red;
    const txt=!w||r.played===0?'Pending':w==='tie'?'TIE':w==='A'?`A wins (${r.aT} v ${r.bT})`:`B wins (${r.bT} v ${r.aT})`;
    return`<div class="match-banner ${cls}" id="fbt-banner-${bid}">
      <div><div class="mb-lbl">${label} · $${cost}</div><div class="mb-sub">${r.played} holes scored</div></div>
      <div id="fbt-banner-score-${bid}" style="font-family:'Bebas Neue';font-size:16px;color:${color};">${txt}</div>
    </div>`;
  };
  el.innerHTML=`
    <div class="card">
      <div class="card-title">Nassau</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">${esc(g.courseName)}<br>A: ${esc(tA)} &nbsp;·&nbsp; B: ${esc(tB)}</div>
      ${banner('FRONT 9',g.costF,fR,'f')}
      ${banner('BACK 9',g.costB,bR,'b')}
      ${banner('TOTAL',g.costT,tR,'t')}
    </div>
    <div class="card"><div class="card-title">Scorecard</div>${renderFBTScorecard(g,players,course)}</div>
    <div class="card"><div class="card-title">Settlement</div><div id="fbt-settlement">${renderFBTSettlement(g)}</div></div>
    <div class="card">
      <div class="card-title">Game Settings</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <label style="font-size:13px;font-weight:600;flex:1;">Front ($)</label>
        <input type="number" min="1" value="${g.costF}"
          style="width:70px;padding:7px 10px;border:1.5px solid var(--surf3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;text-align:center;"
          onchange="fbtAdjust('costF',parseInt(this.value))">
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <label style="font-size:13px;font-weight:600;flex:1;">Back ($)</label>
        <input type="number" min="1" value="${g.costB}"
          style="width:70px;padding:7px 10px;border:1.5px solid var(--surf3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;text-align:center;"
          onchange="fbtAdjust('costB',parseInt(this.value))">
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <label style="font-size:13px;font-weight:600;flex:1;">Total ($)</label>
        <input type="number" min="1" value="${g.costT}"
          style="width:70px;padding:7px 10px;border:1.5px solid var(--surf3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;text-align:center;"
          onchange="fbtAdjust('costT',parseInt(this.value))">
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <label style="font-size:13px;font-weight:600;flex:1;">Stroke off low man</label>
        <label class="switch">
          <input type="checkbox" ${g.strokeMode==='low'?'checked':''} onchange="fbtToggleStrokeMode(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      ${isAdmin()?`<button class="btn btn-danger btn-sm" onclick="abandonGame()">ABANDON</button>`:''}
      <button class="btn btn-gold" style="flex:1;" onclick="finalizeFBTGame()">✓ FINALIZE</button>
    </div>`;
  cacheGameScoreInputs(el);
}

function renderFBTScorecard(g,players,course) {
  const sc=g.scores;
  // Bottom rows: team A and team B best ball net totals per section
  const bottomRowsFn=(holes,cols)=>{
    let html='';
    ['A','B'].forEach(team=>{
      const ids=g.teams[team];
      const names=ids.map(id=>players.find(p=>p.id===id)?.name.split(' ')[0]).join('/');
      const teamTotal=holes.reduce((a,h)=>{
        const nets=ids.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):null;}).filter(v=>v!==null);
        return nets.length?a+Math.min(...nets):a;
      },0);
      const hasAny=holes.some(h=>ids.some(pid=>sc[pid]?.[h.num]!=null));
      html+=`<div class="hole-grid" style="grid-template-columns:${cols};background:#fffcf0;">
        <div class="hole-cell" style="text-align:left;padding-left:4px;font-size:9px;font-weight:700;color:var(--g600);white-space:nowrap;overflow:hidden;">${team}: ${esc(names)}</div>
        ${holes.map(h=>{
          const nets=ids.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):null;}).filter(v=>v!==null);
          const best=nets.length?Math.min(...nets):null;
          const otherIds=g.teams[team==='A'?'B':'A'];
          const otherNets=otherIds.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):null;}).filter(v=>v!==null);
          const otherBest=otherNets.length?Math.min(...otherNets):null;
          let bg='';
          if(best!=null&&otherBest!=null){if(best<otherBest)bg='background:#c8e6c9;';else if(best>otherBest)bg='background:#ffcdd2;';}
          return `<div class="hole-cell" style="font-weight:700;font-size:10px;${bg}">${best!=null?best:''}</div>`;
        }).join('')}
        <div class="hole-cell total" style="font-size:10px;">${hasAny?teamTotal:''}</div>
      </div>`;
    });
    return html;
  };
  return renderScorecard(g, players, bottomRowsFn);
}

function setFBTScore(input) { updateGameScore(input); }

function renderFBTSettlement(g) {
  const course=courseById(g.courseId); if (!course) return '';
  const fR=calcFBTSeg(g,course.holes.slice(0,9)),bR=calcFBTSeg(g,course.holes.slice(9)),tR=calcFBTSeg(g,course.holes);
  const bal={A:0,B:0};
  const apply=(r,cost)=>{if(!r.winner||r.winner==='tie')return;bal[r.winner]+=cost;bal[r.winner==='A'?'B':'A']-=cost;};
  apply(fR,g.costF);apply(bR,g.costB);apply(tR,g.costT);
  const tAn=g.teams.A.map(id=>playerById(id)?.name||id).join(' & ');
  const tBn=g.teams.B.map(id=>playerById(id)?.name||id).join(' & ');
  const wl=(r,lbl,cost)=>!r.winner?`${lbl}: pending`:r.winner==='tie'?`${lbl}: TIE`:`${lbl}: Team ${r.winner} wins $${cost}`;
  let html=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${wl(fR,'Front',g.costF)}<br>${wl(bR,'Back',g.costB)}<br>${wl(tR,'Total',g.costT)}</div>
  <table class="settle-table"><tbody>
    <tr><td>Team A: ${esc(tAn)}</td><td class="${bal.A>=0?'settle-pos':'settle-neg'}" style="text-align:right;">${bal.A>=0?'+':''}\$${bal.A}</td></tr>
    <tr><td>Team B: ${esc(tBn)}</td><td class="${bal.B>=0?'settle-pos':'settle-neg'}" style="text-align:right;">${bal.B>=0?'+':''}\$${bal.B}</td></tr>
  </tbody></table>`;
  if(bal.A!==bal.B){const payer=bal.A<0?tAn:tBn,payee=bal.A>0?tAn:tBn,amt=Math.abs(bal.A);
    html+=`<div class="settle-txn"><span class="settle-neg">${esc(payer)}</span> pays <span class="settle-pos">${esc(payee)}</span> \$${amt}</div>`;}
  return html;
}

function finalizeFBTGame() {
  const g=S.activeGame,course=courseById(g.courseId);
  const fR=calcFBTSeg(g,course.holes.slice(0,9)),bR=calcFBTSeg(g,course.holes.slice(9)),tR=calcFBTSeg(g,course.holes);
  const w=(r,l,c)=>r.winner?`${l}:${r.winner==='tie'?'TIE':r.winner+'($'+c+')'}`:`${l}:open`;
  S.games.push({...g,summary:[w(fR,'F',g.costF),w(bR,'B',g.costB),w(tR,'T',g.costT)].join(' '),finalDate:Date.now()});
  S.activeGame=null; scheduleWrite(); toast('Saved!'); renderGameTab();
}

// ════════════════════════════════════════════
// SHARED
// ════════════════════════════════════════════
function abandonGame() {
  confirmDo('Abandon Game','All scores will be lost. This cannot be undone.',()=>{
    S.activeGame=null; scheduleWrite(); renderGameTab(); toast('Game abandoned');
  });
}

function renderAll() {
  renderGameTab();
  if (_activeTab==='roster') renderPlayers();
  if (_activeTab==='courses') { renderCourses(); buildHoleGrid(); }
  if (_activeTab==='history') renderHistory();
  if (_activeTab==='settings') renderSettings();
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  // Clear wizard-state globals on every page load — they are session-only and must
  // never survive a reload (stale _pickedIds across sessions causes crashes in setup).
  window._pickedIds  = null;
  window._teamState  = null;
  window._cartState  = null;

  // Clear stale localStorage if schema version has changed
  if (localStorage.getItem(VERSION_KEY) !== APP_VERSION) {
    localStorage.removeItem(LS_KEY);
    localStorage.setItem(VERSION_KEY, APP_VERSION);
  }
  loadLocal();
  renderAll();
  fbLoad().then(() => renderAll());
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') fbLoad().then(() => renderAll());
  });
}

init();
</script>
