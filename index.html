<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="4Some Games">
<title>4Some Games</title>
<meta name="theme-color" content="#1a2f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── EXACT Friday Game CSS vars & resets ── */
:root {
  --g900:#0d1f0d; --g800:#1a2f1a; --g700:#243824; --g600:#2e472e;
  --gold:#c9a227; --gold2:#e8c04a;
  --surf:#fff; --surf2:#f4f4f2; --surf3:#e8e8e5;
  --red:#c0392b; --blue:#2471a3;
  --text:#1a1a1a; --muted:#777;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--surf2);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top);}

/* ── HEADER — same as Friday Game, max-width:480px inner ── */
header{background:var(--g800);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);flex-shrink:0;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;max-width:480px;margin:0 auto;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{height:40px;width:40px;object-fit:contain;border-radius:6px;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;}
.admin-badge{background:var(--gold);color:var(--g800);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:0.5px;display:none;}
.admin-badge.visible{display:inline-block;}

/* ── NAV — same as Friday Game, max-width:480px inner ── */
nav{background:var(--g900);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:150;border-top:1px solid rgba(255,255,255,.07);padding-bottom:env(safe-area-inset-bottom);}
.nav-inner{display:flex;max-width:480px;width:100%;margin:0 auto;}
nav button{flex:1;min-width:0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 2px 13px;color:rgba(255,255,255,.4);transition:color .18s;}
nav button svg{width:21px;height:21px;stroke-width:1.8;flex-shrink:0;}
nav button .nav-lbl{font-size:9px;letter-spacing:.3px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
nav button.active{color:var(--gold);}

/* ── MAIN SCROLL ── */
main{flex:1;min-height:0;padding-bottom:calc(80px + env(safe-area-inset-bottom));max-width:480px;width:100%;margin:0 auto;overflow-y:auto;}
.tab{display:none;padding:14px 16px 24px;}
.tab.active-flex{display:flex;flex-direction:column;min-height:0;padding:14px 16px 24px;}
.tab.active{display:block;}

/* ── CARDS ── */
.card{background:var(--surf);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--g800);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--g800);color:#fff;}
.btn-gold{background:var(--gold);color:var(--g800);}
.btn-gold:hover{background:var(--gold2);}
.btn-danger{background:var(--red);color:#fff;}
.btn-outline{background:none;border:1.5px solid var(--g800);color:var(--g800);}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-full{width:100%;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ── FORM ── */
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--surf3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surf);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ── ROSTER GRID — exact Friday Game pattern ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--g800);letter-spacing:1px;}
#roster-grid{overflow-x:auto;}
#roster-header-row{display:grid;gap:6px;padding:4px 2px;border-bottom:2px solid var(--surf3);margin-bottom:4px;}
#roster-header-row div{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;}
#roster-rows .roster-row{display:grid;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--surf3);}
#roster-rows .roster-row input{font-size:14px;font-family:'DM Sans',sans-serif;border:none;border-bottom:1px solid transparent;background:transparent;padding:4px 2px;width:100%;color:var(--text);}
#roster-rows .roster-row input:focus{outline:none;border-bottom-color:var(--gold);}
.roster-save-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--surf3);color:var(--muted);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:14px;}

/* ── COURSE / HOLE GRID ── */
.hole-grid{display:grid;gap:3px;margin-bottom:6px;}
.hole-cell{text-align:center;font-size:11px;padding:4px 1px;border-radius:4px;background:var(--surf2);}
.hole-cell.header{font-weight:700;font-size:10px;color:var(--muted);background:none;}
.hole-cell input{width:100%;border:none;border-bottom:1.5px solid var(--surf3);background:transparent;text-align:center;font-size:12px;padding:3px 1px;font-family:'DM Sans',sans-serif;outline:none;}
.hole-cell input:focus{border-bottom-color:var(--gold);}
.holes-toggle{padding:8px 18px;border-radius:8px;border:1.5px solid var(--surf3);background:var(--surf2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.holes-toggle.active{background:var(--g800);color:var(--gold);border-color:var(--g800);}

/* ── PLAYER CHECKLIST ── */
.check-list{overflow-y:auto;border:1.5px solid var(--surf3);border-radius:8px;max-height:200px;}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--surf3);cursor:pointer;}
.check-item:last-child{border-bottom:none;}
.check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
.check-item label{flex:1;font-size:13px;font-weight:500;cursor:pointer;}
.check-item .hcp-tag{font-size:11px;color:var(--muted);}

/* ── TEAM ASSIGN ── */

/* ── CART ASSIGN ── */
.cart-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.cart-box{background:var(--surf2);border-radius:8px;padding:10px;border:1.5px solid var(--surf3);}
.cart-box-lbl{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--g800);margin-bottom:6px;}

/* ── SCORECARD TABLE ── */
.sc-wrap{overflow-x:auto;}
.stroke-dot::after{content:'•';color:var(--red);font-size:8px;vertical-align:super;margin-left:1px;}

/* ── MATCH STATUS BANNERS ── */
.match-banner{border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.mb-up{background:#f0f9f0;border:1.5px solid #27ae60;}
.mb-tied{background:#fffcf0;border:1.5px solid var(--gold);}
.mb-down{background:#fdf0f0;border:1.5px solid var(--red);}
.mb-pending{background:var(--surf2);border:1.5px solid var(--surf3);}
.mb-lbl{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--g800);}
.mb-sub{font-size:10px;color:var(--muted);}
.mb-score{font-family:'Bebas Neue',sans-serif;font-size:22px;}

/* ── SEGMENT TABS ── */
.seg-tabs{display:flex;gap:6px;margin-bottom:12px;}
.seg-tab{flex:1;padding:8px 4px;border-radius:8px;text-align:center;cursor:pointer;background:var(--surf);border:1.5px solid var(--surf3);transition:all .2s;}
.seg-tab.active{border-color:var(--g800);background:var(--g800);}
.seg-tab-name{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--g800);display:block;}
.seg-tab.active .seg-tab-name{color:var(--gold);}
.seg-tab-holes{font-size:10px;color:var(--muted);}
.seg-tab.active .seg-tab-holes{color:rgba(255,255,255,.5);}

/* ── SETTLEMENT ── */
.settle-table{width:100%;border-collapse:collapse;font-size:13px;}
.settle-table td{padding:7px 6px;border-bottom:1px solid var(--surf3);}
.settle-table tr:last-child td{border-bottom:none;}
.settle-pos{color:#166534;font-weight:700;}
.settle-neg{color:var(--red);font-weight:700;}
.settle-txn{margin-top:10px;font-size:13px;padding:8px 10px;background:var(--surf2);border-radius:6px;}

/* ── PRESS BADGE ── */
.press-badge{display:inline-block;background:var(--red);color:#fff;border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:4px;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surf);border-radius:14px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--g800);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--g800);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MISC ── */
.section-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--muted);margin:14px 0 7px;text-transform:uppercase;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--surf3);}
.list-item:last-child{border-bottom:none;}
.list-item-main{font-weight:600;font-size:14px;}
.list-item-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pts-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pts-row label{min-width:120px;font-size:13px;font-weight:600;}
.pts-row input{width:70px;padding:6px 8px;border:1.5px solid var(--surf3);border-radius:6px;font-size:14px;text-align:center;font-family:'DM Sans',sans-serif;}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--surf3);border-radius:24px;transition:.3s;}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
input:checked + .slider{background:var(--gold);}
input:checked + .slider:before{transform:translateX(20px);}
.game-type-card{border:1.5px solid var(--surf3);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;background:var(--surf);transition:all .2s;}
.game-type-card.selected{border-color:var(--gold);background:#fffcf0;}
.gt-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g800);}
.game-type-card.selected .gt-name{color:var(--gold);}
.gt-desc{font-size:12px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-inner">
    <div class="hdr-left">
      <img class="hdr-logo" src="logo.png" alt="4Some Games">
      <div>
        <div class="hdr-title">4SOME GAMES</div>
        <div class="hdr-sub">v1.5 · Build 2026-05-25</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="admin-badge" id="admin-badge">ADMIN</span>
      <div id="sync-status" style="font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.5px;">⬤ local</div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- GAME TAB -->
  <div class="tab active-flex" id="tab-game-content">
    <div id="game-area"></div>
  </div>

  <!-- ROSTER TAB -->
  <div class="tab" id="tab-roster-content">
    <div class="sec-hdr">
      <div class="sec-title">Roster</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick="rosterRefreshGhin()">⛳ Refresh HI</button>
        <button class="btn btn-gold btn-sm" onclick="rosterAddRow()">+ Add Player</button>
      </div>
    </div>
    <div id="roster-ghin-status" style="font-size:12px;color:var(--muted);margin-bottom:6px;display:none;"></div>
    <div id="roster-grid">
      <div id="roster-header-row">
        <div>NAME</div>
        <div style="text-align:center;">INDEX</div>
        <div id="roster-ghin-hdr" style="display:none;">GHIN #</div>
        <div></div>
        <div id="roster-del-hdr" style="display:none;"></div>
      </div>
      <div id="roster-rows"></div>
    </div>
    <button class="roster-save-btn" id="roster-save-btn" onclick="rosterSaveChanges()">Save Changes</button>
    <div id="roster-save-status" style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px;display:none;"></div>
  </div>

  <!-- COURSES TAB -->
  <div class="tab" id="tab-courses-content">
    <div class="sec-hdr">
      <div class="sec-title">Courses</div>
    </div>
    <div id="courses-list"></div>
    <div class="card" id="course-form-card">
      <div class="card-title" id="course-form-title">Add Course</div>
      <div class="field-row">
        <div class="field"><label>Name</label><input id="c-name" type="text" placeholder="Course name"></div>
        <div class="field"><label>Tee Color</label><input id="c-tee" type="text" placeholder="e.g. White, Blue, Gold…"></div>
      </div>
      <div class="field-row3">
        <div class="field"><label>Rating</label><input id="c-rating" type="number" step="0.1" placeholder="72.3"></div>
        <div class="field"><label>Slope</label><input id="c-slope" type="number" placeholder="113"></div>
        <div class="field"><label>Par</label><input id="c-par" type="number" placeholder="72"></div>
      </div>
      <div class="field">
        <label>Holes</label>
        <div style="display:flex;gap:8px;">
          <button class="holes-toggle active" id="holes18-btn" onclick="setHoles(18)">18 Holes</button>
          <button class="holes-toggle" id="holes9-btn" onclick="setHoles(9)">9 Holes</button>
        </div>
      </div>
      <div class="section-label">Hole Pars</div>
      <div class="hole-grid" id="hole-pars"></div>
      <div class="section-label">Handicap Ratings</div>
      <div class="hole-grid" id="hole-hcps"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-gold" onclick="saveCourse()">SAVE COURSE</button>
        <button class="btn btn-outline btn-sm" onclick="clearCourseForm()">CLEAR</button>
      </div>
      <input type="hidden" id="c-edit-id">
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab" id="tab-history-content">
    <div id="history-list"></div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="tab" id="tab-settings-content">
    <div class="card" style="background:var(--g800);color:#fff;margin-bottom:12px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);">4SOME GAMES</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;">
        <span>Version <strong style="color:#fff;">v1.5</strong></span> &nbsp;·&nbsp;
        <span id="settingsBuildTime" style="color:rgba(255,255,255,.5);"></span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Import from Extras Manager</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Import players from the Extras Manager Wed or Thu roster.</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" style="flex:1;" onclick="importFromExtras('wed')">WED Roster</button>
        <button class="btn btn-outline" style="flex:1;" onclick="importFromExtras('thu')">THU Roster</button>
      </div>
      <div id="importStatus" style="font-size:12px;margin-top:8px;display:none;"></div>
    </div>
    <div class="card">
      <div class="card-title">Admin Mode</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:13px;font-weight:600;">Admin Mode</div>
          <div style="font-size:11px;color:var(--muted);" id="adminModeDesc">Off — delete actions hidden</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="adminModeToggle" onchange="toggleAdmin()">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">GHIN Proxy</div>
      <div class="field"><label>Proxy URL</label><input type="text" id="cfgGhinProxy" placeholder="https://ghin-proxy.brianzrimsek.workers.dev"></div>
      <div id="cfgProxyStatus" style="font-size:11px;margin-bottom:10px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gold" onclick="saveConfig()">SAVE</button>
        <button class="btn btn-outline btn-sm" onclick="testProxy()">TEST CONNECTION</button>
      </div>
    </div>
  </div>
</main>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <button id="tab-game" class="active" onclick="showTab('game')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
      <span class="nav-lbl">Game</span>
    </button>
    <button id="tab-roster" onclick="showTab('roster')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-lbl">Roster</span>
    </button>
    <button id="tab-courses" onclick="showTab('courses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 17l4-8 4 4 4-6 4 10"/><path d="M3 20h18"/></svg>
      <span class="nav-lbl">Courses</span>
    </button>
    <button id="tab-history" onclick="showTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="nav-lbl">History</span>
    </button>
    <button id="tab-settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <span class="nav-lbl">Settings</span>
    </button>
  </div>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
// ════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════
const APP_VERSION = '1.5';
const BUILD_TIME  = '2026-05-25 18:39';  // v1.0 original
const VERSION_KEY = 'fs_version';



// ════════════════════════════════════════════
// CHANGELOG

//   Fix:  Removed two calls to rebuildActiveGameMatrix() which was never

const FB_BASE = 'https://extras-manager-default-rtdb.firebaseio.com/foursome';

let _writeTimer = null;

// STATE
// ════════════════════════════════════════════
let S = blankState();
function blankState() {
  return {
    players: [],
    courses: [],
    games: [],
    activeGame: null,
    config: { ghinProxyUrl: '', writeKey: null },
    settings: { strokeOffBest: false }
  };
}

function uid() { return (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function isAdmin() { return adminMode; }
function playerById(id) { return S.players.find(p => p.id === id); }
function courseById(id) { return S.courses.find(c => c.id === id); }
function lastNameOf(name) { const p=(name||'').trim().split(' '); return p[p.length-1]||''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { if(!ts)return''; return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
/** Format handicap index: negative stored value → display as +2.0 for plus-handicaps. */
function fmtHcp(h) { if(h===null||h===undefined||isNaN(h))return'—'; const n=+h; return n<0?'+'+Math.abs(n).toFixed(1):n.toFixed(1); }

// ════════════════════════════════════════════
// PERSISTENCE — exact Friday Game pattern
// writeKey lives inside state.json under config.writeKey
// ════════════════════════════════════════════
function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {} }
function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      S = normalizeState(JSON.parse(raw));
      // Note: getStrokes() is computed live from state — no matrix to rebuild.
    }
  } catch(e) { S = blankState(); }
}

// Convert Firebase object-with-numeric-keys back to a proper JS array.
// Firebase strips true arrays and returns {"0":x,"1":y,...} — toArr handles both.
function toArr(v) { return v ? (Array.isArray(v) ? v : Object.values(v)) : []; }

// Normalize raw state from localStorage or Firebase into a clean S object.
// Ensures all array fields are real arrays, all config defaults are present,
// and the writeKey is never generated locally (must come from Firebase).
function normalizeState(raw) {
  try {
    raw = raw || {};
    raw.players  = toArr(raw.players);
    raw.courses  = toArr(raw.courses);
    raw.games    = toArr(raw.games);
    raw.config   = raw.config || { ghinProxyUrl: '', writeKey: null };
    if (!raw.config.writeKey) raw.config.writeKey = null;
    raw.settings = raw.settings || { strokeOffBest: false };
    raw.activeGame = raw.activeGame || null;
    return raw;
  } catch(e) {
    console.error('normalizeState failed:', e);
    return blankState();
  }
}

function scheduleWrite() {
  S = normalizeState(S);
  saveLocal();
  if (_writeTimer) clearTimeout(_writeTimer);
  _writeTimer = setTimeout(() => { fbWrite(S); _writeTimer = null; }, 1500);
}

async function fbWrite(data) {
  // Don't write until we have the real writeKey from Firebase
  if (!data.config || !data.config.writeKey) {
    setSyncStatus('pending', 'var(--gold)');
    return;
  }
  setSyncStatus('saving…', 'var(--gold)');
  try {
    const resp = await fetch(FB_BASE + '/state.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    setSyncStatus('synced', '#86efac');
  } catch(e) { setSyncStatus('offline', '#f87171'); }
}

async function fbLoad() {
  // Only replace local state if Firebase has real data (players or courses).
  // If Firebase only has config, pull the writeKey but keep local data intact.
  // This prevents an empty Firebase from wiping a populated localStorage.
  setSyncStatus('syncing…', 'var(--gold)');
  fetch(FB_BASE + '/state.json')
    .then(r => r.ok ? r.json() : null)
    .then(remote => {
      if (remote && typeof remote === 'object') {
        const normalized = normalizeState(remote);
        const hasRemoteData = (normalized.players && normalized.players.length) ||
                              (normalized.courses && normalized.courses.length) ||
                              (normalized.games   && normalized.games.length);
        if (hasRemoteData) {
          // Firebase has real data — use it as source of truth
          S = normalized;
        } else {
          // Firebase has config only — pull writeKey, keep local data
          S.config.writeKey = (normalized.config && normalized.config.writeKey) || S.config.writeKey;
        }
        saveLocal();
        renderAll();
        setSyncStatus('ready', '#86efac');
      } else {
        setSyncStatus('local', 'var(--g300)');
      }
    })
    .catch(() => setSyncStatus('offline', '#f87171'));
}

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = '⬤ ' + msg; el.style.color = color || 'rgba(255,255,255,.4)'; }
}

  <div class="modal-actions">

function showTab(name) {
  _activeTab = name;
  // Remove both active classes from all tabs before adding the correct one
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    t.classList.remove('active-flex');
  });
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  // Game tab needs flex layout so the scorecard fills the viewport correctly
  const cls = name === 'game' ? 'active-flex' : 'active';
  document.getElementById('tab-' + name + '-content').classList.add(cls);
  document.getElementById('tab-' + name).classList.add('active');
  renderTab(name);
}
function renderTab(name) {
  if (name==='game')    renderGameTab();
  if (name==='roster')  renderPlayers();
  if (name==='courses') { renderCourses(); buildHoleGrid(); }
  if (name==='history') renderHistory();
  if (name==='settings') renderSettings();
}

function renderPlayers() {
  const el = document.getElementById('roster-rows');
  if (!el) return;
  // Show/hide admin columns
  const ghinHdr = document.getElementById('roster-ghin-hdr');
  const delHdr  = document.getElementById('roster-del-hdr');
  const hdr     = document.getElementById('roster-header-row');
  const cols    = isAdmin() ? '1fr 70px 90px 32px' : '1fr 70px 32px';
  if (hdr) hdr.style.gridTemplateColumns = cols;
  if (ghinHdr) ghinHdr.style.display = isAdmin() ? '' : 'none';
  if (delHdr)  delHdr.style.display  = isAdmin() ? '' : 'none';

  const sorted = [...S.players].sort((a,b)=>lastNameOf(a.name).localeCompare(lastNameOf(b.name)));
  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--muted);padding:12px 2px;">No players yet. Tap "+ Add Player" to begin.</div>`;
    return;
  }
  el.innerHTML = sorted.map(p => {
    return `<div id="row-${p.id}" class="roster-row" style="grid-template-columns:${cols};">
      <input type="text" value="${esc(p.name)}"
        style="color:${!p.name?'var(--muted)':'var(--text)'};"
        onchange="rosterUpdateName('${p.id}',this.value)"
        onfocus="this.style.borderBottomColor='var(--gold)'"
        onblur="this.style.borderBottomColor='transparent'">
      <input type="number" value="${p.hcp!==undefined?p.hcp:''}" step="0.1" min="-10" max="54"
        style="text-align:center;color:${p.hcp<0?'var(--gold)':'var(--text)'};font-weight:${p.hcp<0?700:400};"
        onchange="rosterUpdateHcp('${p.id}',this.value)"
        onfocus="this.style.borderBottomColor='var(--gold)'"
        onblur="this.style.borderBottomColor='transparent'">
      ${isAdmin() ? `<input type="text" value="${esc(p.ghin||'')}" placeholder="GHIN#"
        style="font-size:12px;text-align:center;"
        onchange="rosterUpdateGhin('${p.id}',this.value)"
        onfocus="this.style.borderBottomColor='var(--gold)'"
        onblur="this.style.borderBottomColor='transparent'">` : ''}
      <button onclick="rosterDeletePlayer('${p.id}')"
        style="background:none;border:none;cursor:pointer;font-size:15px;color:${isAdmin()?'#f87171':'#ccc'};padding:4px;line-height:1;"
        ${!isAdmin()?'disabled':''}>✕</button>
    </div>`;
  }).join('');
}

function rosterUpdateName(pid, val) {
  val = val.trim();
  if (!val) { toast('Name cannot be empty'); renderPlayers(); return; }
  const p = playerById(pid); if (p) { p.name=val; rosterMarkDirty(); }
}
function rosterUpdateHcp(pid, val) {
  const hcp = parseFloat(val);
  if (isNaN(hcp)||hcp<-10||hcp>54) { toast('Handicap must be −10 to 54'); renderPlayers(); return; }
  const p = playerById(pid); if (p) { p.hcp=hcp; rosterMarkDirty(); }
}
function rosterUpdateGhin(pid, val) {
  const p = playerById(pid); if (p) { p.ghin=val.trim().replace(/\D/g,''); rosterMarkDirty(); }
}
function rosterMarkDirty() {
  _rosterDirty = true;
  const btn = document.getElementById('roster-save-btn');
  if (btn) { btn.style.background='var(--g800)'; btn.style.color='var(--gold)'; btn.textContent='Save Changes'; }
}
function rosterSaveChanges() {
  scheduleWrite(); _rosterDirty = false;
  const btn = document.getElementById('roster-save-btn');
  const statEl = document.getElementById('roster-save-status');
  if (btn) { btn.style.background='#166534'; btn.style.color='#fff'; btn.textContent='✓ Saved'; setTimeout(()=>{ btn.style.background='var(--surf3)'; btn.style.color='var(--muted)'; btn.textContent='Save Changes'; },2000); }
  if (statEl) { statEl.style.display='block'; statEl.textContent='Changes saved'; setTimeout(()=>{statEl.style.display='none';},2000); }
}
function rosterAddRow() {
  const id = uid();
  S.players.push({ id, name:'', ghin:'', hcp:0 });
  renderPlayers();
  const inp = document.querySelector(`#row-${id} input[type="text"]`);
  if (inp) { inp.focus(); inp.style.borderBottomColor='var(--gold)'; }
  rosterMarkDirty();
}
function rosterDeletePlayer(pid) {
  const p = playerById(pid); if (!p) return;
  S.players = S.players.filter(x=>x.id!==pid);
  scheduleWrite(); renderPlayers(); toast('Player removed');
}
// ── GHIN fetch utility ────────────────────────────────────────────────────
// Single canonical GHIN fetch used by all refresh functions.
// Posts ghin numbers to proxy, returns results array. Returns [] on any error.
// Callers handle their own UI updates and state writes.
async function ghinFetch(proxy, players) {
  const withGhin = players.filter(p => p.ghin);
  if (!withGhin.length || !proxy) return [];
  try {
    const r = await fetch(proxy, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ghinNumbers: withGhin.map(p => p.ghin) })
    });
    if (!r.ok) return [];
    const d = await r.json();
    return d.results || [];
  } catch(e) { return []; }
}

async function rosterRefreshGhin() {
  const withGhin = S.players.filter(p=>p.ghin);
  if (!withGhin.length) return toast('No players have a GHIN number');
  const proxy = S.config.ghinProxyUrl;
  if (!proxy) return toast('Add GHIN Proxy URL in Settings first');
  const statusEl = document.getElementById('roster-ghin-status');
  statusEl.style.display=''; statusEl.textContent=`Fetching ${withGhin.length} indexes…`;
  const results = await ghinFetch(proxy, withGhin);
  let updated=0;
  results.forEach(res => {
    const p = S.players.find(x=>String(x.ghin)===String(res.ghin));
    if (p && res.handicap_index!=null) { p.hcp=res.handicap_index; updated++; }
  });
  scheduleWrite(); renderPlayers();
  statusEl.textContent = updated ? `✓ Updated ${updated} index${updated!==1?'es':''}` : '✗ Fetch failed';
  setTimeout(()=>{ statusEl.style.display='none'; }, 3000);
}
async function importFromExtras(league) {
  const statusEl = document.getElementById('importStatus');
  statusEl.style.display=''; statusEl.textContent=`Loading ${league.toUpperCase()} from Extras Manager…`;
  try {
    const r = await fetch('https://extras-manager-default-rtdb.firebaseio.com/state.json');
    const d = await r.json();
    const players = d?.leagues?.[league]?.players;
    const arr = !players ? [] : Array.isArray(players) ? players : Object.values(players);
    if (!arr.length) { statusEl.textContent=`No players found in ${league.toUpperCase()}.`; return; }
    const existing = new Set(S.players.map(p=>p.name.toLowerCase()));
    let imported=0, skipped=0;
    arr.forEach(p => {
      if (!p||!p.name) return;
      if (existing.has(p.name.toLowerCase())) { skipped++; return; }
      S.players.push({ id:uid(), name:p.name, ghin:p.ghin||'', hcp:typeof p.hcp==='number'?p.hcp:0 });
      imported++;
    });
    scheduleWrite(); renderPlayers(); rosterMarkDirty();
    statusEl.style.color='#27ae60';
    statusEl.textContent=`✓ Imported ${imported} player${imported!==1?'s':''} (${skipped} already existed).`;
  } catch(e) { statusEl.textContent='✗ Import failed: '+e.message; }
}

function setHoles(n) {
  _courseHoles = n;
  document.getElementById('holes18-btn').className = n===18?'holes-toggle active':'holes-toggle';
  document.getElementById('holes9-btn').className  = n===9 ?'holes-toggle active':'holes-toggle';
  buildHoleGrid();
}
function buildHoleGrid(parVals, hcpVals) {
  const pEl=document.getElementById('hole-pars'), hEl=document.getElementById('hole-hcps');
  if (!pEl||!hEl) return;
  const n=_courseHoles, cols=`repeat(${Math.min(n,9)},1fr)`;
  pEl.style.gridTemplateColumns=cols; hEl.style.gridTemplateColumns=cols;
  let pH='', hH='';
  for (let i=1;i<=n;i++) {
    pH+=`<div class="hole-cell"><div class="hole-num" style="font-size:9px;color:var(--muted)">${i}</div><input type="number" id="cp-${i}" placeholder="4" min="3" max="6" value="${parVals?parVals[i-1]:''}"></div>`;
    hH+=`<div class="hole-cell"><div class="hole-num" style="font-size:9px;color:var(--muted)">${i}</div><input type="number" id="ch-${i}" placeholder="${i}" min="1" max="${n*2}" value="${hcpVals?hcpVals[i-1]:''}"></div>`;
  }
  pEl.innerHTML=pH; hEl.innerHTML=hH;
}
function saveCourse() {
  const name=document.getElementById('c-name').value.trim();
  const teeColor=document.getElementById('c-tee').value.trim();
  const rating=parseFloat(document.getElementById('c-rating').value);
  const slope=parseInt(document.getElementById('c-slope').value);
  const par=parseInt(document.getElementById('c-par').value);
  if (!name) return toast('Course name required');
  if (isNaN(rating)||isNaN(slope)||isNaN(par)) return toast('Rating, slope and par required');
  const holes=[];
  for (let i=1;i<=_courseHoles;i++) {
    const p=parseInt(document.getElementById(`cp-${i}`)?.value);
    const h=parseInt(document.getElementById(`ch-${i}`)?.value);
    if (isNaN(p)||isNaN(h)) return toast(`Fill hole ${i}`);
    holes.push({num:i,par:p,hcp:h});
  }
  const eid=document.getElementById('c-edit-id').value;
  if (eid) {
    const c=courseById(eid); if (c) Object.assign(c,{name,teeColor,rating,slope,par,holes});
    document.getElementById('c-edit-id').value='';
    document.getElementById('course-form-title').textContent='Add Course';
  } else { S.courses.push({id:uid(),name,teeColor,rating,slope,par,holes}); }
  scheduleWrite(); renderCourses(); clearCourseForm(); toast('Course saved');
}
function clearCourseForm() {
  ['c-name','c-tee','c-rating','c-slope','c-par','c-edit-id'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('course-form-title').textContent='Add Course';
  _courseHoles=18; setHoles(18);
}
function renderCourses() {
  const el=document.getElementById('courses-list'); if (!el) return;
  const fc=document.getElementById('course-form-card');
  if (fc) fc.style.display=isAdmin()?'':'none';
  if (!S.courses.length) {
    el.innerHTML=`<div style="font-size:13px;color:var(--muted);padding:8px 0 16px;">No courses yet${isAdmin()?' — add one below':''}</div>`;
    return;
  }
  el.innerHTML=S.courses.map(c=>`
    <div class="list-item">
      <div>
        <div class="list-item-main">${esc(c.name)}</div>
        <div class="list-item-sub">${c.holes.length} holes · Par ${c.par} · ${c.rating}/${c.slope}${c.teeColor?' · '+esc(c.teeColor)+' tees':''}</div>
      </div>
      ${isAdmin()?`<div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick="editCourse('${c.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCourse('${c.id}')">✕</button>
      </div>`:''}
    </div>`).join('');
}
function editCourse(id) {
  const c=courseById(id); if (!c) return;
  document.getElementById('c-name').value=c.name;
  document.getElementById('c-tee').value=c.teeColor||'';
  document.getElementById('c-rating').value=c.rating;
  document.getElementById('c-slope').value=c.slope;
  document.getElementById('c-par').value=c.par;
  document.getElementById('c-edit-id').value=id;
  document.getElementById('course-form-title').textContent='Edit Course';
  _courseHoles=c.holes.length; setHoles(_courseHoles);
  setTimeout(()=>{ c.holes.forEach(h=>{ const pe=document.getElementById(`cp-${h.num}`),he=document.getElementById(`ch-${h.num}`); if(pe)pe.value=h.par; if(he)he.value=h.hcp; }); },30);
  document.getElementById('course-form-card').scrollIntoView({behavior:'smooth'});
}
function deleteCourse(id) {
  const c=courseById(id); if (!c) return;
  confirmDo('Delete Course',`Delete "${c.name}"?`,()=>{ S.courses=S.courses.filter(x=>x.id!==id); scheduleWrite(); renderCourses(); });
}

// ════════════════════════════════════════════
// HANDICAP MATH
// ════════════════════════════════════════════
// USGA course handicap formula: converts a handicap index to strokes for a
// specific course. slope/113 scales the index to course difficulty; (rating-par)
// adjusts for the course's expected score vs par.
function calcCourseHcp(hcpIdx, slope, rating, par) {
  return Math.round(hcpIdx * (slope / 113) + (rating - par));
}
// Strokes a player receives (or gives) on a specific hole.
// holeHcpRating = the raw difficulty rank entered on the course (e.g. 1 = hardest).
// hcpScale = total holes (18 or 9) — used as the modulus so strokes are spread
// proportionally. A player with courseHcp=4 on an 18-hole course gets 1 stroke
// on each of the 4 hardest holes (hcp rating <= 4). Negative courseHcp = plus-hcp
// player who gives strokes rather than receives them.
function strokesOnHole(courseHcp, holeHcpRating, hcpScale) {
  const mod = hcpScale || 18;
  if (courseHcp >= 0) {
    const full   = Math.floor(courseHcp / mod);   // strokes on every hole (CH>=18)
    const remain = courseHcp % mod;               // additional strokes on hardest holes
    return full + (holeHcpRating <= remain ? 1 : 0);
  } else {
    // Plus-handicap: player gives strokes on the easiest holes
    const absHcp = Math.abs(courseHcp);
    const full   = Math.floor(absHcp / mod);
    const remain = absHcp % mod;
    return -(full + (holeHcpRating <= remain ? 1 : 0));
  }
}
// Compute each player's course handicap from their handicap index.
// strokeOffLow=true: subtract the lowest CH from everyone so the best player
// gets 0 strokes and others get the positive difference. This is "stroke off
// low man". rawChs always holds the unmodified course HCPs for display purposes
// (the scorecard shows both so players can see the raw and adjusted values).
function buildChs(players, course, strokeOffLow) {
  const chs = {};
  players.forEach(p => { chs[p.id] = calcCourseHcp(p.hcp, course.slope, course.rating, course.par); });
  const minCH = Math.min(...Object.values(chs));
  if (strokeOffLow) {
    const adj = {};
    players.forEach(p => { adj[p.id] = Math.max(0, chs[p.id] - minCH); });
    return { chs: adj, rawChs: chs, minCH };
  }
  return { chs, rawChs: chs, minCH };
}
// Keep buildStrokeMatrix for compatibility but it now wraps buildChs
function buildStrokeMatrix(players, course, strokeOffLow) {
  const { chs, rawChs, minCH } = buildChs(players, course, strokeOffLow);
  // hcpScale = number of holes — strokes distributed across all holes
  const hcpScale = course.holes.length;
  // Return chs and rawChs only — matrix is no longer stored, strokes computed live
  return { chs, rawChs, minCH };
}

// Live stroke lookup — replaces stored strokeMatrix entirely.
// Called during render with the current game, player id, and hole object.
// ch = g.chs[pid] already accounts for strokeOffLow adjustment.
function getStrokes(g, pid, hole) {
  const ch = (g.chs || {})[pid] || 0;
  const course = courseById(g.courseId);
  if (!course) return 0;
  return strokesOnHole(ch, hole.hcp, course.holes.length);
}

// GHIN refresh for selected players at game start
async function refreshSelectedIndexes(selectedIds) {
  const proxy=S.config.ghinProxyUrl;
  if (!proxy) return; // silently skip — no proxy configured
  const withGhin=selectedIds.map(id=>playerById(id)).filter(p=>p&&p.ghin);
  if (!withGhin.length) return;
  const results = await ghinFetch(proxy, withGhin);
  let updated=0;
  results.forEach(res=>{
    const p=S.players.find(x=>String(x.ghin)===String(res.ghin));
    if (p&&res.handicap_index!=null){p.hcp=res.handicap_index;updated++;}
  });
  if (updated>0) { scheduleWrite(); toast(`✓ Refreshed ${updated} HI`); }
}

function teamAssignDropdownHTML(teamState, playerIds) {
  const players=playerIds.map(id=>playerById(id));
  const slotSelect=(team,slot)=>{
    const currentPid=(teamState[team]||[])[slot];
    const otherSlots=[['A',0],['A',1],['B',0],['B',1]].filter(([t,s])=>!(t===team&&s===slot));
    const takenByOther=otherSlots.map(([t,s])=>(teamState[t]||[])[s]).filter(Boolean);
    const available=players.filter(p=>!takenByOther.includes(p.id));
    const label=`${team}${slot+1}`;
    const opts=`<option value="">— ${label} —</option>`+
      available.map(p=>`<option value="${p.id}"${p.id===currentPid?' selected':''}>${esc(p.name)}</option>`).join('');
    return `<div style="margin-bottom:6px;">
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Player ${slot+1}</label>
      <select style="width:100%;padding:8px 10px;border:1.5px solid ${currentPid?'var(--gold)':'var(--surf3)'};border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:${currentPid?'#fffcf0':'var(--surf)'};color:var(--text);outline:none;"
        onchange="doTeamAssign(this.value,'${team}',${slot},this)">${opts}</select>
    </div>`;
  };
  return `<div class="cart-grid">
    <div class="cart-box"><div class="cart-box-lbl">Team A</div>${slotSelect('A',0)}${slotSelect('A',1)}</div>
    <div class="cart-box"><div class="cart-box-lbl">Team B</div>${slotSelect('B',0)}${slotSelect('B',1)}</div>
  </div>`;
}
// Called when a team slot <select> changes. Saves the chosen player into
// _teamState, then re-renders all four dropdowns so each one only shows
// players not already taken by another slot.
function doTeamAssign(pid, team, slot, selectEl) {
  if (!window._teamState[team]) window._teamState[team]=[];
  window._teamState[team][slot]=pid||null;
  // Compact: remove nulls/undefineds left by clearing a slot
  window._teamState[team]=window._teamState[team].filter(Boolean);
  refreshTeamAssign();
}
function refreshTeamAssign() {
  const c=document.getElementById('team-assign-container');
  if (c) c.innerHTML=teamAssignDropdownHTML(window._teamState, window._pickedIds);
}
// Legacy helpers no longer needed but kept to avoid errors if called
function clearTeamSlot(team,idx) { if(window._teamState[team]) window._teamState[team].splice(idx,1); refreshTeamAssign(); }
function assignToTeam(pid) {
  const ts=window._teamState;
  if((ts.A||[]).length<2){ts.A=[...(ts.A||[]),pid];}else if((ts.B||[]).length<2){ts.B=[...(ts.B||[]),pid];}
  refreshTeamAssign();
}

function renderCartAssign() {
  const cs=window._cartState;
  const players=window._pickedIds.map(id=>playerById(id));

  // Build a <select> for each slot showing available players (unassigned + currently in this slot)
  const slotSelect=(cart,role)=>{
    const currentPid=cs[cart][role];
    const label=role.charAt(0).toUpperCase()+role.slice(1);
    // A player is available for this slot if they're unassigned OR they're already in this slot
    const otherSlots=[['cart1','driver'],['cart1','passenger'],['cart2','driver'],['cart2','passenger']]
      .filter(([c,r])=>!(c===cart&&r===role));
    const takenByOther=otherSlots.map(([c,r])=>cs[c][r]).filter(Boolean);
    const available=players.filter(p=>!takenByOther.includes(p.id));
    const opts=`<option value="">— ${label} —</option>`+
      available.map(p=>`<option value="${p.id}"${p.id===currentPid?' selected':''}>${esc(p.name)}</option>`).join('');
    return `<div style="margin-bottom:6px;">
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">${label}</label>
      <select style="width:100%;padding:8px 10px;border:1.5px solid ${currentPid?'var(--gold)':'var(--surf3)'};border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:${currentPid?'#fffcf0':'var(--surf)'};color:var(--text);outline:none;"
        onchange="doCartAssign(this.value,'${cart}','${role}',this)">${opts}</select>
    </div>`;
  };

  document.getElementById('cart-assign-container').innerHTML=`
    <div class="cart-grid">
      <div class="cart-box"><div class="cart-box-lbl">🚗 Cart 1</div>${slotSelect('cart1','driver')}${slotSelect('cart1','passenger')}</div>
      <div class="cart-box"><div class="cart-box-lbl">🚗 Cart 2</div>${slotSelect('cart2','driver')}${slotSelect('cart2','passenger')}</div>
    </div>`;
}
function clearCartSlot(cart,role) {
  window._cartState[cart][role]=null; renderCartAssign();
}
function doCartAssign(pid,cart,role,selectEl) {
  window._cartState[cart][role]=pid||null;
  renderCartAssign(); // re-render to update all selects
}
// Validate cart assignments, build the stroke matrix, then create the activeGame
// object. Splits the course into three equal segments (6/6/6 for 18 holes) —
// one segment per DOC match (Drivers, Opposites, Cart Partners).
function startDOCGame() {
  const cs=window._cartState;
  if (!cs.cart1.driver||!cs.cart1.passenger||!cs.cart2.driver||!cs.cart2.passenger) return toast('Assign all 4 cart slots');
  const courseId=document.getElementById('doc-course').value;
  const cost=parseInt(document.getElementById('doc-cost').value);
  const strokeMode=document.getElementById('doc-stroke').value;
  const players=window._pickedIds.map(id=>playerById(id));
  const course=courseById(courseId);
  const {chs,rawChs}=buildChs(players,course,strokeMode==='low');
  const n=course.holes.length, segSize=Math.floor(n/3);
  const segs=[course.holes.slice(0,segSize),course.holes.slice(segSize,segSize*2),course.holes.slice(segSize*2)];
  S.activeGame={
    id:uid(),type:'doc',date:Date.now(),
    courseId:course.id,courseName:course.name,
    cost,strokeMode,carts:cs,
    playerIds:window._pickedIds,playerNames:players.map(p=>p.name),
    chs,rawChs,scores:{},segs,activeSeg:0
  };
  window._pickedIds.forEach(id=>{S.activeGame.scores[id]={};});
  scheduleWrite(); renderDOCGame();
}

// ─── DOC GAME RENDER ───
// docMatchDefs: builds the three match definitions for a DOC game.
// DOC = Drivers vs Passengers, Opposites, Cart Partners.
// Each segment plays the same 18 holes (split into three 6-hole overlapping
// matches): segment 0 = holes 1-6, segment 1 = holes 7-12, segment 2 = holes 13-18.
// team1/team2 are arrays of two player IDs; t1lbl/t2lbl are display names.
function docMatchDefs(g) {
  const {cart1,cart2}=g.carts;
  // Helper: first name of player by id
  const fn=id=>(playerById(id)?.name||'').split(' ')[0]||'?';
  // Match 1: Drivers v Passengers
  const d1=fn(cart1.driver), d2=fn(cart2.driver);
  const p1=fn(cart1.passenger), p2=fn(cart2.passenger);
  return [
    {team1:[cart1.driver,cart2.driver],   team2:[cart1.passenger,cart2.passenger],
     t1lbl:`${d1}/${d2}`, t2lbl:`${p1}/${p2}`},
    {team1:[cart1.driver,cart2.passenger], team2:[cart2.driver,cart1.passenger],
     t1lbl:`${d1}/${p2}`, t2lbl:`${d2}/${p1}`},
    {team1:[cart1.driver,cart1.passenger], team2:[cart2.driver,cart2.passenger],
     t1lbl:`${d1}/${p1}`, t2lbl:`${d2}/${p2}`}
  ];
}
// Score one DOC segment (6 holes). Each hole: take each team's best-ball net
// score (gross minus strokes). Lowest net wins the hole. Returns status object
// used to drive the banner display and settlement.
function calcDOCMatch(g,segIdx,defs) {
  const seg=g.segs[segIdx],def=defs[segIdx],sc=g.scores;
  let t1w=0,t2w=0;
  seg.forEach(h=>{
    // Best-ball net: minimum (gross - strokes) across each team's two players.
    // 999 = no score entered yet — treat as unplayed.
    const t1=Math.min(...def.team1.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
    const t2=Math.min(...def.team2.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
    if(t1===999&&t2===999)return; if(t1<t2)t1w++;else if(t2<t1)t2w++;
  });
  const diff=t1w-t2w;
  if(diff===0)return{cls:'mb-tied',color:'#8a6700',leading:null,display:'All Square'};
  if(diff>0)return{cls:'mb-up',color:'#166534',leading:def.t1lbl,display:`${def.t1lbl} ${diff}↑`};
  return{cls:'mb-down',color:var_red,leading:def.t2lbl,display:`${def.t2lbl} ${Math.abs(diff)}↑`};
}
const var_red='#c0392b';

function renderDOCGame() {
  const g=S.activeGame;
  const players=g.playerIds.map(id=>playerById(id)||{id,name:id});
  const defs=docMatchDefs(g), statuses=[0,1,2].map(i=>calcDOCMatch(g,i,defs));
  const el=document.getElementById('game-area');

  // Match status banners (all 3, always visible)
  const banners=statuses.map((st,i)=>`
    <div class="match-banner ${st.cls}" id="doc-banner-${i}">
      <div><div class="mb-lbl">${['Drivers v Pass.','Opposites','Cart Partners'][i]}</div>
        <div class="mb-sub">Holes ${g.segs[i][0].num}–${g.segs[i][g.segs[i].length-1].num}</div></div>
      <div class="mb-score" id="doc-banner-score-${i}" style="color:${st.color};">${st.display}</div>
    </div>`).join('');

  el.innerHTML=`
    <div class="card">

// Full 18-hole (or 9-hole) scorecard split into Front/Back blocks — Friday Game style
function renderDOCFullScorecard(g, players, defs) {
  const sc=g.scores;
  // Bottom rows: best ball rows per match segment + hole-winner dots
  const bottomRowsFn=(holes,cols)=>{
    let html='';
    defs.forEach((def,di)=>{
      const segHoles=g.segs[di];
      const inSection=holes.filter(h=>segHoles.some(sh=>sh.num===h.num));
      if (!inSection.length) return;
      [def.team1,def.team2].forEach((team,ti)=>{
        const lbl=ti===0?def.t1lbl:def.t2lbl;
        const teamTotal=inSection.reduce((a,h)=>{
          const best=Math.min(...team.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
          return a+(best<999?best:0);
        },0);
        const hasAny=inSection.some(h=>team.some(pid=>sc[pid]?.[h.num]!=null));
        html+=`<div class="hole-grid" style="grid-template-columns:${cols};background:#fffcf0;">
          <div class="hole-cell" style="text-align:left;padding-left:4px;font-size:9px;font-weight:700;color:var(--g600);white-space:nowrap;overflow:hidden;">${lbl}</div>
          ${holes.map(h=>{
            const inSeg=segHoles.some(sh=>sh.num===h.num);
            if (!inSeg) return `<div class="hole-cell" style="background:#f4f4f2;"></div>`;
            const best=Math.min(...team.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
            const otherTeam=ti===0?def.team2:def.team1;
            const otherBest=Math.min(...otherTeam.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
            let bg='';
            if(best<999&&otherBest<999){if(best<otherBest)bg='background:#c8e6c9;';else if(best>otherBest)bg='background:#ffcdd2;';}
            return `<div class="hole-cell" style="font-weight:700;font-size:10px;${bg}">${best<999?best:''}</div>`;
          }).join('')}
          <div class="hole-cell total" style="font-size:10px;">${hasAny?teamTotal:''}</div>
        </div>`;
      });
    });
    return html;
  };

  let html=renderScorecard(g, players, bottomRowsFn);

  // Hole-winner dots for each match segment
  html+=`<div style="margin-top:10px;">`;
  defs.forEach((def,di)=>{
    const seg=g.segs[di];
    html+=`<div style="margin-bottom:8px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;">${['Drivers v Pass.','Opposites','Cart Partners'][di]}</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;">`;
    seg.forEach(h=>{
      const t1=Math.min(...def.team1.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
      const t2=Math.min(...def.team2.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
      let bg='var(--surf3)',val='·';
      if(t1<999||t2<999){if(t1<t2){bg='#c8e6c9';val=t1;}else if(t2<t1){bg='#ffcdd2';val=t2;}else{bg='#fff9c4';val=t1;}}
      html+=`<div style="width:22px;height:22px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text);">${val}</div>`;
    });
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

// ════════════════════════════════════════════
// SHARED SCORECARD RENDERER — used by all three games
//
// Renders a responsive grid scorecard using CSS Grid (no <table>).
// Layout: 60px name col | 1fr per hole | 36px total col — fits any screen
// without horizontal scroll.
//
// Score inputs use oninput (fires per keystroke) so auto-advance triggers
// immediately when a valid score is typed, not on blur.
//
// Auto-advance order is HOLE-MAJOR: P1H1→P2H1→P3H1→P4H1→P1H2→...
// This matches the real-world flow where one hole is scored at a time.
//
// bottomRowsFn(holes, cols) — optional callback returning additional HTML rows
// appended after the player rows in each 9-hole section. DOC uses it for
// best-ball net rows; FBT/Nassau uses it for team best-ball; Walk-off passes null.
// ════════════════════════════════════════════
function renderScorecard(g, players, bottomRowsFn) {
  const course=courseById(g.courseId);
  if (!course) return '';
  const sc=g.scores;
  const allHoles=course.holes;
  const front=allHoles.slice(0,9);
  const back=allHoles.slice(9);

  function section(holes, sectionLabel, totalLabel) {
    const parTotal=holes.reduce((a,h)=>a+h.par,0);
    const cols=`60px repeat(${holes.length},1fr) 36px`;

    let html=`<div class="hole-grid" style="grid-template-columns:${cols};">
      <div class="hole-cell" style="background:var(--g800);color:rgba(255,255,255,.5);font-size:9px;font-weight:700;">${sectionLabel}</div>
      ${holes.map(h=>`<div class="hole-cell" style="background:var(--g800);color:var(--gold);font-size:10px;font-weight:700;">${h.num}</div>`).join('')}
      <div class="hole-cell" style="background:var(--g800);color:rgba(255,255,255,.5);font-size:9px;font-weight:700;">${totalLabel}</div>
    </div>`;
    html+=`<div class="hole-grid" style="grid-template-columns:${cols};">
      <div class="hole-cell header">Par</div>
      ${holes.map(h=>`<div class="hole-cell par-cell">${h.par}</div>`).join('')}
      <div class="hole-cell total">${parTotal}</div>
    </div>`;

    players.forEach((p,pi)=>{
      const rowTotal=holes.reduce((a,h)=>a+(sc[p.id]?.[h.num]??0),0);
      const hasAny=holes.some(h=>sc[p.id]?.[h.num]!=null);
      const bt=pi>0?'border-top:1px solid var(--surf3);':'';
      const isfront=sectionLabel==='FRONT'||sectionLabel==='HOLES';
      const totId=isfront?`sc-tot-f-${p.id}`:`sc-tot-b-${p.id}`;
      html+=`<div style="${bt}"><div class="hole-grid" style="grid-template-columns:${cols};">
        <div class="hole-cell header" style="text-align:left;padding-left:4px;font-size:10px;font-weight:700;white-space:normal;overflow:visible;line-height:1.3;height:auto;">
          ${esc(p.name.split(' ')[0])}<br>
          ${(()=>{
            const raw=g.rawChs?.[p.id]??g.chs[p.id]??'?';
            const adj=g.chs[p.id]??'?';
            const offLow=g.strokeMode==='low';
            const rawBold=!offLow, adjBold=offLow;
            return `<span style="font-size:9px;font-weight:${rawBold?700:400};color:${rawBold?'var(--text)':'var(--muted)'};">${raw}</span>`
                 + `<span style="font-size:9px;color:var(--muted);"> · </span>`
                 + `<span style="font-size:9px;font-weight:${adjBold?700:400};color:${adjBold?'var(--text)':'var(--muted)'};">${adj}</span>`;
          })()}
        </div>
        ${holes.map(h=>{
          const strokes=getStrokes(g,p.id,h);
          const hasDot=strokes>0, givesBack=strokes<0;
          const cellBg=hasDot?'background:#fde8e8;':givesBack?'background:#e8f4ec;':'';
          const dot=hasDot?`<span style="position:absolute;top:0;right:1px;color:#c0392b;font-size:7px;line-height:1;">${'•'.repeat(Math.min(strokes,3))}</span>`:'';
          const gross=sc[p.id]?.[h.num];
          return `<div class="hole-cell" style="position:relative;padding:0;${cellBg}">
            <input type="number" min="1" max="15" value="${gross!=null?gross:''}"
              data-pid="${p.id}" data-hole="${h.num}"
              inputmode="numeric" oninput="updateGameScore(this)"
              class="game-score-input"
              style="width:100%;border:none;font-size:11px;text-align:center;padding:4px 0;background:transparent;font-family:'DM Sans',sans-serif;outline:none;">
            ${dot}
          </div>`;
        }).join('')}
        <div class="hole-cell total" id="${totId}" style="font-size:11px;">${hasAny?rowTotal:''}</div>
      </div></div>`;
    });

    if (bottomRowsFn) {
      html+=`<div style="border-top:2px solid var(--surf3);">${bottomRowsFn(holes,cols)}</div>`;
    }
    return html;
  }

  let html='';
  html+=section(front, back.length?'FRONT':'HOLES', back.length?'OUT':'TOT');
  if (back.length) {
    html+=`<div style="border-top:2px solid var(--surf3);">${section(back,'BACK','IN')}</div>`;
    // 18-hole total bar
    html+=`<div style="border-top:2px solid var(--g800);background:var(--g800);border-radius:0 0 6px 6px;">`;
    players.forEach(p=>{
      const tot=allHoles.reduce((a,h)=>a+(sc[p.id]?.[h.num]??0),0);
      const hasAny=allHoles.some(h=>sc[p.id]?.[h.num]!=null);
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-top:1px solid var(--g600);">
        <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8);">${esc(p.name.split(' ')[0])}</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);" id="sc-tot-18-${p.id}">${hasAny?tot:''}</span>
      </div>`;
    });
    html+='</div>';
  }
  return html;
}

// Shared score handler — works for all three game types
let _gameScoreInputCache = null;
let _gameScoreHoleMajorIdx = null;

// Central score entry handler — wired to oninput on every score cell across
// all three game types. Two rendering paths:
//   • Partial hole (1-3 players scored): targeted DOM updates only — totals
//     and standings banners updated in-place, no scorecard rebuild, no flash.
//   • Hole complete (all 4 players scored):
//       - DOC: full re-render (needed for best-ball rows and hole-winner dots)
//       - Walk-off / Nassau: targeted update + status popup (no re-render)
function updateGameScore(input) {
  const pid=input.dataset.pid, hole=parseInt(input.dataset.hole), val=parseInt(input.value);
  const g=S.activeGame;
  if (!g.scores[pid]) g.scores[pid]={};
  g.scores[pid][hole]=isNaN(val)||val<1?null:val;
  scheduleWrite();

  // Capture advance index before any DOM changes
  const shouldAdvance = !isNaN(val) && val >= 1;
  let nextIdx = -1;
  if (shouldAdvance && _gameScoreHoleMajorIdx) {
    const cur=_gameScoreHoleMajorIdx.indexOf(input);
    if (cur >= 0 && cur < _gameScoreHoleMajorIdx.length-1) nextIdx=cur+1;
  }

  // Check if all 4 players now have a score on this hole
  const holeComplete = g.playerIds.every(id => g.scores[id]?.[hole] != null);

  const mainEl = document.querySelector('main');
  const scrollY = mainEl ? mainEl.scrollTop : 0;

  if (holeComplete) {
    if (g.type==='doc') {
      // DOC needs full re-render for best-ball rows and hole-winner dots
      renderDOCGame();
      if (mainEl) mainEl.scrollTop = scrollY;
    } else {
      // Walkoff and Nassau: targeted update + popup — no page movement
      updateScoreTotals(g, pid);
      updateStandingsInPlace(g);
      setTimeout(()=>showHoleStatusPopup(g, hole), 200);
    }
  } else {
    updateScoreTotals(g, pid);
    updateStandingsInPlace(g);
    if (mainEl) mainEl.scrollTop = scrollY;
  }

  if (holeComplete && g.type!=='doc') {
    // Don't move focus — user can tap next hole manually or popup auto-dismisses
  } else if (nextIdx >= 0 && _gameScoreHoleMajorIdx && nextIdx < _gameScoreHoleMajorIdx.length) {
    setTimeout(()=>{
      const n=_gameScoreHoleMajorIdx[nextIdx];
      if (n) {
        n.focus({ preventScroll: true });
        n.select();
        if (mainEl) mainEl.scrollTop = scrollY;
      }
    }, 30);
  }
}

// ── Hole status popup — used by Walk-off and Nassau after hole completion ──
// Displayed 200ms after the 4th score on a hole is entered. Shows current
// match/segment status for that hole without re-rendering the scorecard
// (avoiding any flash or scroll jump). Auto-dismisses after 3 seconds or
// on tap. Uses a CSS animation to slide up from the bottom of the screen.
let _holePopupTimer = null;
function showHoleStatusPopup(g, hole) {
  dismissHolePopup();
  const var_red='#dc2626';
  let rows='';
  if (g.type==='walkoff') {
    (g.matches||[]).forEach((m,idx)=>{
      const st=calcOneMatch(g,m); if(!st)return;
      const mNum=idx+1;
      const holeInMatch=hole>=m.startHole;
      if(!holeInMatch)return;
      const dormieStyle=st.isDormie?`border-left:3px solid var(--gold);padding-left:6px;`:'';
      rows+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);${dormieStyle}">
        <span style="font-size:12px;color:rgba(255,255,255,.7);">M${mNum} · $${m.cost}</span>
        <span style="font-size:16px;font-family:'Bebas Neue',sans-serif;color:${st.color};">${st.score}</span>
      </div>`;
    });
  } else {
    // Nassau
    const course=courseById(g.courseId); if(!course)return;
    const front=course.holes.slice(0,9),back=course.holes.slice(9),all=course.holes;
    [[calcFBTSeg(g,front),'Front'],[calcFBTSeg(g,back),'Back'],[calcFBTSeg(g,all),'Total']].forEach(([r,lbl])=>{
      if(r.played===0)return;
      const color=!r.winner?'#d4a012':r.winner==='tie'?'#d4a012':r.winner==='A'?'#86efac':var_red;
      const txt=!r.winner?'Pending':r.winner==='tie'?'TIE':r.winner==='A'?`A ${r.aT}–${r.bT}`:`B ${r.bT}–${r.aT}`;
      rows+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);">
        <span style="font-size:12px;color:rgba(255,255,255,.7);">${lbl}</span>
        <span style="font-size:16px;font-family:'Bebas Neue',sans-serif;color:${color};">${txt}</span>
      </div>`;
    });
  }
  if(!rows)return;
  const popup=document.createElement('div');
  popup.id='hole-status-popup';
  popup.onclick=()=>dismissHolePopup();
  popup.innerHTML=`<div style="background:var(--g900);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 18px;min-width:220px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);">
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;margin-bottom:6px;">HOLE ${hole}</div>
    ${rows}
    <div style="font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:8px;">tap to dismiss</div>
  </div>`;
  Object.assign(popup.style,{
    position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',
    zIndex:'9999',cursor:'pointer',
    animation:'slideUp .2s ease'
  });
  // Add keyframe if not already there
  if(!document.getElementById('popup-style')) {
    const s=document.createElement('style');
    s.id='popup-style';
    s.textContent='@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(popup);
  _holePopupTimer=setTimeout(()=>dismissHolePopup(), 3000);
}
function dismissHolePopup() {
  if(_holePopupTimer){clearTimeout(_holePopupTimer);_holePopupTimer=null;}
  const el=document.getElementById('hole-status-popup');
  if(el)el.remove();
}
function updateScoreTotals(g, pid) {
  const course=courseById(g.courseId); if (!course) return;
  const sc=g.scores;
  const front=course.holes.slice(0,9), back=course.holes.slice(9), all=course.holes;
  const fTot=front.reduce((a,h)=>a+(sc[pid]?.[h.num]??0),0);
  const fAny=front.some(h=>sc[pid]?.[h.num]!=null);
  const fEl=document.getElementById(`sc-tot-f-${pid}`);
  if (fEl) fEl.textContent=fAny?fTot:'';
  if (back.length) {
    const bTot=back.reduce((a,h)=>a+(sc[pid]?.[h.num]??0),0);
    const bAny=back.some(h=>sc[pid]?.[h.num]!=null);
    const bEl=document.getElementById(`sc-tot-b-${pid}`);
    if (bEl) bEl.textContent=bAny?bTot:'';
    const tot=all.reduce((a,h)=>a+(sc[pid]?.[h.num]??0),0);
    const anyAll=all.some(h=>sc[pid]?.[h.num]!=null);
    const tEl=document.getElementById(`sc-tot-18-${pid}`);
    if (tEl) tEl.textContent=anyAll?tot:'';
  }
}

// Update banners and settlement in-place without touching the scorecard DOM
function updateStandingsInPlace(g) {
  if (g.type==='doc') {
    const defs=docMatchDefs(g);
    const statuses=[0,1,2].map(i=>calcDOCMatch(g,i,defs));
    statuses.forEach((st,i)=>{
      const sc=document.getElementById(`doc-banner-score-${i}`);
      const bn=document.getElementById(`doc-banner-${i}`);
      if (sc) { sc.textContent=st.display; sc.style.color=st.color; }
      if (bn) { bn.className=`match-banner ${st.cls}`; }
    });
    const sd=document.getElementById('doc-settlement');
    if (sd) sd.innerHTML=renderDOCSettlement(g);
  } else if (g.type==='walkoff') {
    (g.matches||[]).forEach((m,idx)=>{
      const st=calcOneMatch(g,m);
      if(!st)return;
      const bn=document.getElementById(`wo-banner-${idx}`);
      const sc=document.getElementById(`wo-banner-score-${idx}`);
      if(bn)bn.className=`match-banner ${st.cls}`;
      if(sc){sc.textContent=st.score;sc.style.color=st.color;}
    });
    const sd=document.getElementById('wo-settlement');
    if(sd)sd.innerHTML=renderWalkoffSettlement(g);
  } else {
    const course=courseById(g.courseId); if (!course) return;
    const front=course.holes.slice(0,9),back=course.holes.slice(9),all=course.holes;
    const fR=calcFBTSeg(g,front),bR=calcFBTSeg(g,back),tR=calcFBTSeg(g,all);
    [[fR,'f',g.costF],[bR,'b',g.costB],[tR,'t',g.costT]].forEach(([r,bid,cost])=>{
      const w=r.winner;
      const color=!w?'#8a6700':w==='tie'?'#8a6700':w==='A'?'#166534':var_red;
      const txt=!w||r.played===0?'Pending':w==='tie'?'TIE':w==='A'?`A wins (${r.aT} v ${r.bT})`:`B wins (${r.bT} v ${r.aT})`;
      const cls=!w?'mb-pending':w==='tie'?'mb-tied':w==='A'?'mb-up':'mb-down';
      const bn=document.getElementById(`fbt-banner-${bid}`);
      const sc=document.getElementById(`fbt-banner-score-${bid}`);
      if (bn) bn.className=`match-banner ${cls}`;
      if (sc) { sc.textContent=txt; sc.style.color=color; }
    });
    const sd=document.getElementById('fbt-settlement');
    if (sd) sd.innerHTML=renderFBTSettlement(g);
  }
}

// DOM inputs are rendered player-major (all holes for P1, then P2, etc.)
// but we want to advance hole-major (all players on H1, then H2, etc.).
// This groups inputs by hole number, sorts holes numerically, then flattens
// to produce: [P1H1, P2H1, P3H1, P4H1, P1H2, P2H2, ...].
function buildHoleMajorIndex(inputs) {
  const byHole={};
  inputs.forEach(inp=>{const h=inp.dataset.hole;if(!byHole[h])byHole[h]=[];byHole[h].push(inp);});
  return Object.keys(byHole).map(Number).sort((a,b)=>a-b).flatMap(h=>byHole[h]);
}

function cacheGameScoreInputs(container) {
  _gameScoreInputCache = Array.from(container.querySelectorAll('.game-score-input'));
  _gameScoreHoleMajorIdx = buildHoleMajorIndex(_gameScoreInputCache);
}

function renderDOCSettlement(g) {
  const defs=docMatchDefs(g), statuses=[0,1,2].map(i=>calcDOCMatch(g,i,defs)), cost=g.cost;
  const balances={}; g.playerIds.forEach(id=>{balances[id]=0;});
  [0,1,2].forEach(i=>{
    const st=statuses[i],def=defs[i]; if(!st.leading)return;
    const winners=st.leading===def.t1lbl?def.team1:def.team2;
    const losers=st.leading===def.t1lbl?def.team2:def.team1;
    winners.forEach(id=>{balances[id]+=cost;}); losers.forEach(id=>{balances[id]-=cost;});
  });
  const players=g.playerIds.map(id=>playerById(id)||{id,name:id});
  let html=`<table class="settle-table"><tbody>${players.map(p=>{const b=balances[p.id]||0;
    return`<tr><td>${esc(p.name)}</td><td class="${b>0?'settle-pos':b<0?'settle-neg':''}" style="text-align:right;">${b>0?`+$${b}`:b<0?`-$${Math.abs(b)}`:'Even'}</td></tr>`;
  }).join('')}</tbody></table>`;
  const pos=players.filter(p=>(balances[p.id]||0)>0), neg=players.filter(p=>(balances[p.id]||0)<0);
  if(pos.length&&neg.length){html+='<div style="margin-top:8px;">';
    neg.forEach(d=>{let rem=d.hcp||0;rem=balances[d.id]*-1;
      pos.forEach(c=>{if(rem<=0)return;const pay=Math.min(rem,balances[c.id]);rem-=pay;
        html+=`<div class="settle-txn"><span class="settle-neg">${esc(d.name)}</span> pays <span class="settle-pos">${esc(c.name)}</span> $${pay}</div>`;});});
    html+='</div>';}
  return html;
}

function finalizeDOCGame() {
  const g=S.activeGame, defs=docMatchDefs(g), st=[0,1,2].map(i=>calcDOCMatch(g,i,defs));
  const summary=st.map((s,i)=>`${['Drv','Opp','Crt'][i]}:${s.display}`).join(' | ');
  S.games.push({...g,summary,finalDate:Date.now()});
  S.activeGame=null; scheduleWrite(); toast('Game saved!'); renderGameTab();
}

// ════════════════════════════════════════════
// 20/10 WALK-OFF
// Two-team match play. Match 1 costs $20, Match 2 costs $10. Matches are
// sequential — when Match 1 closes (winner mathematically determined before
// 18 holes), Match 2 starts on the next hole. Each match is hole-by-hole
// best-ball net (gross - strokes). Dormie detection prevents a closed match
// from being overturned. calcOneMatch() handles all match state; woAutoAdvance()
// scans for auto-closures after each score entry.
// ════════════════════════════════════════════
function startWalkoffGame() {
  const ts=window._teamState;
  if ((ts.A||[]).length!==2||(ts.B||[]).length!==2) return toast('Assign 2 players to each team');
  const courseId=document.getElementById('wo-course').value;
  const cost1=parseInt(document.getElementById('wo-c1').value);
  const cost2=parseInt(document.getElementById('wo-c2').value);
  const strokeMode=document.getElementById('wo-stroke').value;
  const players=window._pickedIds.map(id=>playerById(id));
  const course=courseById(courseId);
  const {chs,rawChs}=buildChs(players,course,strokeMode==='low');
  S.activeGame={
    id:uid(),type:'walkoff',date:Date.now(),
    courseId:course.id,courseName:course.name,
    cost1,cost2,strokeMode,
    teams:{A:ts.A,B:ts.B},playerIds:window._pickedIds,
    playerNames:window._pickedIds.map(id=>playerById(id)?.name||id),
    chs,rawChs,scores:{},
    // matches: array of {startHole, cost, closed, winner, closedOnHole}
    // match index 0 = M1 ($cost1), index 1+ = M2 ($cost2) and presses
    matches:[{startHole:1, cost:cost1, closed:false, winner:null, closedOnHole:null}]
  };
  window._pickedIds.forEach(id=>{S.activeGame.scores[id]={};});
  scheduleWrite(); renderWalkoffGame();
}

// Calculate the live state of a single walk-off match entry.
// A match runs from match.startHole to the end of the course.
// Hole winner = team with lowest best-ball net (gross - strokes); 999 = unplayed.
// Auto-close: when |diff| > remaining holes, the trailing team can't catch up.
// Dormie: |diff| === remaining — trailing team can only tie at best.
// Returns a full status object used by banners, popup, and settlement.
// calcOneMatch: scores a single match from its startHole to end of course.
// Returns status object with diff (positive=A leads), thru (holes played),
// isDormie (lead equals holes remaining), isClosed, winner, and CSS classes.
// 999 = no score entered — hole treated as unplayed.
function calcOneMatch(g, match) {
  const course=courseById(g.courseId); if (!course) return null;
  const allHoles=course.holes;
  const start=match.startHole||1;
  // Determine end: next match's startHole - 1, or end of course
  const holes=allHoles.filter(h=>h.num>=start);
  const sc=g.scores;
  let aUp=0,bUp=0,thru=0;
  let closedOnHole=null;
  holes.forEach((h,idx)=>{
    const aNet=Math.min(...g.teams.A.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
    const bNet=Math.min(...g.teams.B.map(pid=>{const gr=sc[pid]?.[h.num];return gr!=null?gr-(getStrokes(g,pid,h)):999;}));
    if(aNet===999&&bNet===999)return;
    thru++;
    if(aNet<bNet)aUp++;else if(bNet<aNet)bUp++;
    const rem=holes.length-(idx+1);
    const diff=Math.abs(aUp-bUp);
    if(!closedOnHole && diff>rem) closedOnHole=h.num;
  });
  const diff=aUp-bUp;
  const remaining=holes.length-thru;
  const absDiff=Math.abs(diff);
  const isDormie=!closedOnHole && absDiff>0 && absDiff===remaining && remaining>0;
  const isClosed=match.closed || !!closedOnHole;
  // If auto-closed, derive winner
  let winner=match.winner;
  if(!winner && closedOnHole) winner=diff>0?'A':diff<0?'B':'tie';
  let label,score,cls,color;
  const var_red='#dc2626';
  if(diff===0){
    if(isDormie){label='Dormie';score='All Square';cls='mb-tied';color='#8a6700';}
    else{label='All Square';score='All Square';cls='mb-tied';color='#8a6700';}
  } else if(diff>0){
    label=isDormie?`A Dormie ${absDiff}`:`Team A ${absDiff} UP`;
    score=`A ${absDiff}↑`;cls='mb-up';color='#166534';
  } else {
    label=isDormie?`B Dormie ${absDiff}`:`Team B ${absDiff} UP`;
    score=`B ${absDiff}↑`;cls='mb-down';color=var_red;
  }
  return{diff,aUp,bUp,thru,holesInMatch:holes.length,remaining,isDormie,isClosed,closedOnHole,winner,label,score,cls,color};
}

// Called at the top of every renderWalkoffGame(). Scans all matches for any
// that have been mathematically closed by the scores (|diff| > remaining) but
// not yet marked closed in state. When found: marks it closed, derives the
// winner, appends the next match to g.matches starting on the next hole, and
// sets g._pendingPressPrompt so renderWalkoffGame() can fire the press modal
// after the DOM is built. Returns true if any match was auto-closed.
function woAutoAdvance(g) {
  const course=courseById(g.courseId); if (!course) return;
  const totalHoles=course.holes.length;
  let changed=false;
  g.matches.forEach((m,idx)=>{
    if(m.closed) return;
    const st=calcOneMatch(g,m);
    if(!st) return;
    if(st.closedOnHole && !m.closed) {
      m.closed=true;
      m.winner=st.winner;
      m.closedOnHole=st.closedOnHole;
      changed=true;
      // Start next match automatically if holes remain
      const nextStart=st.closedOnHole+1;
      if(nextStart<=totalHoles && idx===g.matches.length-1) {
        const nextCost=idx===0?g.cost2:g.matches[idx].cost;
        g.matches.push({startHole:nextStart,cost:nextCost,closed:false,winner:null,closedOnHole:null});
        g._pendingPressPrompt={matchIdx:g.matches.length-1,startHole:nextStart,cost:nextCost};
      }
    }
  });
  return changed;
}

    const subLabel=m.closed?`Closed H${m.closedOnHole} — ${m.winner==='tie'?'Halved':`Team ${m.winner} wins`}`
      :st.isDormie?`Dormie — ${st.remaining} left`:`Thru ${st.thru}`;
    const bannerStyle=st.isDormie?'border:2px solid var(--gold);':'';
    matchBannersHtml+=`

    // Admin controls for active (non-closed) last match
    if(isAdmin() && !m.closed && isLast) {

        ${idx>0?`<button class="btn btn-outline btn-sm" onclick="woAddPress(${idx})">+ PRESS</button>`:''}

  el.innerHTML=`

      ${matchBannersHtml}
    </div>
    <div class="card">
      <div class="card-title">Scorecard</div>
      ${renderWalkoffScorecard(g,players,course)}
    </div>
    <div class="card"><div class="card-title">Settlement</div><div id="wo-settlement">${renderWalkoffSettlement(g)}</div></div>
    <div class="card">
      <div class="card-title">Game Settings</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
